        let resultadosBusqueda = [];

        function buscar(texto) {
            const contenedor = document.getElementById('resultado-busqueda');
            const listaCompleta = document.getElementById('lista-completa');
            
            if (texto.length < 2) {
                contenedor.classList.add('hidden');
                contenedor.innerHTML = '';
                listaCompleta.classList.remove('hidden');
                return;
            }
            
            listaCompleta.classList.add('hidden');
            contenedor.classList.remove('hidden');
            
            const textoLower = texto.toLowerCase();
            resultadosBusqueda = [];
            
            Object.keys(baseDatos).forEach(categoria => {
                baseDatos[categoria].items.forEach(item => {
                    if (item.nombre.toLowerCase().includes(textoLower)) {
                        resultadosBusqueda.push({
                            ...item,
                            categoria: baseDatos[categoria].nombre
                        });
                    }
                });
            });
            
            if (resultadosBusqueda.length === 0) {
                contenedor.innerHTML = `
                    <div class="bg-white/5 rounded-2xl p-12 text-center">
                        <span class="text-6xl mb-4 block">😕</span>
                        <h3 class="text-xl font-bold text-white mb-2">No encontrado</h3>
                        <p class="text-gray-400">No hay resultados para "<span class="text-green-400">${texto}</span>"</p>
                        <p class="text-gray-500 text-sm mt-2">¿Quieres algo específico? Escríbenos por WhatsApp</p>
                        <a href="https://wa.me/56964681874?text=Hola!%20Quiero%20solicitar:%20${encodeURIComponent(texto)}" 
                           target="_blank" 
                           class="inline-block mt-4 px-6 py-3 bg-green-500 text-black font-bold rounded-lg hover:bg-green-400 transition">
                            💬 Preguntar por WhatsApp
                        </a>
                    </div>
                `;
                return;
            }
            
            contenedor.innerHTML = `
                <div class="bg-green-500/10 border border-green-500/30 rounded-xl p-4 mb-6">
                    <p class="text-green-400 font-bold">🔍 ${resultadosBusqueda.length} resultado(s) para "<span class="text-white">${texto}</span>"</p>
                </div>

            `;

        function crearCard(item) {
            return `
                <div class="item-card rounded-xl p-4">
                    <div class="flex items-start justify-between mb-2">
                        <span class="text-lg">${item.categoria}</span>
                        <span class="text-xl font-bold text-green-400">$${item.precio.toLocaleString('es-CL')}</span>
                    </div>
                    <h4 class="font-bold text-white mb-3 text-sm leading-tight">${item.nombre}</h4>
                    <button onclick="comprar('${item.nombre.replace(/'/g, "\\'")}', ${item.precio}, '${item.categoria}')" 
                            class="w-full py-2 bg-gradient-to-r from-green-500 to-cyan-500 text-black font-bold rounded-lg text-sm hover:scale-105 transition">
                        🛒 Comprar

                </div>
            `;

        function comprar(nombre, precio, categoria) {
            document.getElementById('modal-item-nombre').textContent = nombre;

            document.getElementById('modal-compra').classList.add('flex');
        }

        function cerrarModal() {
            document.getElementById('modal-compra').classList.add('hidden');
            document.getElementById('modal-compra').classList.remove('flex');
        }

        function enviarPedido(e) {
            e.preventDefault();
            const nombre = document.getElementById('cliente-nombre').value;
            const email = document.getElementById('cliente-email').value;
            const whatsapp = document.getElementById('cliente-whatsapp').value;
            const item = document.getElementById('modal-item-nombre').textContent;
            const precio = document.getElementById('modal-item-precio').textContent;
            
            const mensaje = `🛒 *NUEVO PEDIDO*%0A%0A📦 *Producto:* ${item}%0A💰 *Precio:* ${precio}%0A%0A👤 *Datos del cliente:*%0ANombre: ${nombre}%0AEmail: ${email}%0AWhatsApp: ${whatsapp}`;
            
            window.open(`https://wa.me/56964681874?text=${mensaje}`, '_blank');
            cerrarModal();
        }

        function renderizarListaCompleta() {
            const contenedor = document.getElementById('lista-completa');
            let html = '';
            
            Object.keys(baseDatos).forEach(categoria => {
                const data = baseDatos[categoria];
                html += `
                    <div class="category-section rounded-2xl p-6 mb-8">
                        <div class="flex items-center justify-between mb-4 cursor-pointer" onclick="toggleSection(this)">
                            <h3 class="font-headline text-xl font-bold flex items-center gap-2">
                                ${data.nombre}

                                ${data.items.map(item => crearCard(item)).join('')}
                            </div>
                        </div>
                    </div>
                `;
            });
            
            contenedor.innerHTML = html;
        }

        function toggleSection(element) {
            const content = element.nextElementSibling;
            const arrow = element.querySelector('span');
            content.classList.toggle('open');
            arrow.style.transform = content.classList.contains('open') ? 'rotate(0deg)' : 'rotate(-90deg)';
        }

        renderizarListaCompleta();
